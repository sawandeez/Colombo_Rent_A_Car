# Application Configuration
spring.application.name=extracted-backend
server.port=8081

# MongoDB Configuration
# Prefer providing this via env var MONGODB_URI (recommended for Atlas / prod)
# Default keeps local development safe.
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/car-rental-db}
spring.data.mongodb.database=car-rental-db
spring.data.mongodb.auto-index-creation=true

# Logging Configuration
logging.level.root=INFO
logging.level.com.example.backend=DEBUG
logging.level.com.example.backend.security=DEBUG
logging.level.org.springframework.security=DEBUG

# JWT Configuration
jwt.secret=VGhpc0lzQVNlY3VyZUFuZFN1ZmZpY2llbnRseUxvbmdCYXNlNjRLZXlGb3JKV1RTaWduaW5nMTIzNDU2Nzg5MA==
jwt.expiration=86400000

# Booking document upload
app.upload.base-dir=uploads
app.upload.max-file-size-bytes=5242880
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB