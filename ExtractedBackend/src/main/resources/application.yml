spring:
  application:
    name: extracted-backend
  data:
    mongodb:
      # Read from MONGODB_URI environment variable, with fallback for local development
      # keep quotes around URI to avoid YAML parsing issues
      uri: "${MONGODB_URI:mongodb://localhost:27017/car-rental-db}"

      auto-index-creation: true

server:
  port: 8081

logging:
  level:
    root: INFO
    com.example.backend: DEBUG

jwt:
  # Provide via env var JWT_SECRET; must be BASE64 and >= 256-bit for HS256
  secret: "${JWT_SECRET:VGhpc0lzQVNlY3VyZUFuZFN1ZmZpY2llbnRseUxvbmdCYXNlNjRLZXlGb3JKV1RTaWduaW5nMTIzNDU2Nzg5MA==}"
  # milliseconds
  expiration: "${JWT_EXPIRATION:86400000}"
